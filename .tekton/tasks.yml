apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: output
spec:
  params:
    - name: app-name
      type: string
    - name: build-image
      type: string
  workspaces:
    - name: output
  tasks:
    - name: cleanup
      taskRef:
        name: cleanup
      workspaces:
        - name: source
          workspace: output

    - name: git-clone
      taskRef:
        name: git-clone
      workspaces:
        - name: output
          workspace: output

    - name: flake8
      taskRef:
        name: flake8
      runAfter:
        - git-clone
      workspaces:
        - name: output
          workspace: output

    - name: nose
      taskRef:
        name: nose
      runAfter:
        - git-clone
      workspaces:
        - name: source
          workspace: output

    - name: buildah
      taskRef:
        name: buildah
      runAfter:
        - nose
      workspaces:
        - name: output
          workspace: output

    - name: deploy
      taskRef:
        name: openshift-client
      runAfter:
        - buildah
      params:
        - name: SCRIPT
          value: |
            oc create deployment $(params.app-name) \
              --image=$(params.build-image) \
              --dry-run=client -o yaml | oc apply -f -
